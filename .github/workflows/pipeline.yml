name: Full Project Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///:memory:"
    defaults:
      run:
        working-directory: back
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "back/requirements.txt"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Lint and Format Check
        run: |
          ruff check .
          ruff format --check .
      - name: Run Pytest
        run: pytest

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "front/package-lock.json"
      - name: Install dependencies
        run: npm install
      - name: Prettier Check
        run: npx prettier --check .
      - name: ESLint Check
        run: npm run lint
      - name: Build
        run: npm run build
